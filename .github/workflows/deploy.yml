name: Deploy a Cloudflare Pages

# Auto-deploy: cada push a main construye el sitio estático y lo publica en
# Cloudflare Pages (proyecto "regikaha"). El primer despliegue crea el proyecto
# y configura el dominio regikaha.com + www. La API de Cloudflare se llama desde
# el runner de GitHub (que sí tiene acceso de red).
#
# Secrets necesarios en el repo (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   token de Cloudflare con permisos de Pages (+ Zone DNS para el dominio)
#   CLOUDFLARE_ACCOUNT_ID  id de la cuenta de Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: regikaha
  PRODUCTION_BRANCH: main
  DOMAIN: regikaha.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build (export estático → ./out)
        run: npm run build

      - name: Asegurar proyecto de Pages (idempotente)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Comprobando proyecto de Pages '$PROJECT_NAME'…"
          code=$(curl -s -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME")
          if [ "$code" != "200" ]; then
            echo "No existe; creándolo…"
            curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects" \
              --data "{\"name\":\"$PROJECT_NAME\",\"production_branch\":\"$PRODUCTION_BRANCH\"}" \
              | head -c 600 || true
          else
            echo "El proyecto ya existe."
          fi

      - name: Desplegar a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=regikaha --branch=main --commit-dirty=true

      - name: Configurar dominio regikaha.com + www
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ok=1
          for host in "$DOMAIN" "www.$DOMAIN"; do
            echo "── Vinculando $host al proyecto Pages ──"
            resp=$(curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME/domains" \
              --data "{\"name\":\"$host\"}")
            echo "$resp"
            if echo "$resp" | grep -q '"success":true'; then
              echo "✅ $host añadido"
            elif echo "$resp" | grep -qiE "already|exists|duplicate|81053|8000007"; then
              echo "✅ $host ya estaba configurado"
            else
              echo "❌ $host NO se pudo configurar"
              ok=0
            fi
            echo ""
          done
          if [ "$ok" != "1" ]; then
            echo "El dominio no se configuró. Revisa que regikaha.com sea una zona en esta cuenta"
            echo "y que el token tenga permisos de Cloudflare Pages (y Zone DNS)."
            exit 1
          fi
          echo "Dominio configurado correctamente."
