name: Deploy a Cloudflare Pages

# Auto-deploy: cada push a main construye el sitio estático y lo publica en
# Cloudflare Pages (proyecto "regikaha"). El primer despliegue crea el proyecto
# y configura el dominio regikaha.com + www. La API de Cloudflare se llama desde
# el runner de GitHub (que sí tiene acceso de red).
#
# Secrets necesarios en el repo (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   token de Cloudflare con permisos de Pages (+ Zone DNS para el dominio)
#   CLOUDFLARE_ACCOUNT_ID  id de la cuenta de Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: regikaha
  PRODUCTION_BRANCH: main
  DOMAIN: regikaha.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build (export estático → ./out)
        run: npm run build

      - name: Asegurar proyecto de Pages (idempotente)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Comprobando proyecto de Pages '$PROJECT_NAME'…"
          code=$(curl -s -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME")
          if [ "$code" != "200" ]; then
            echo "No existe; creándolo…"
            curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects" \
              --data "{\"name\":\"$PROJECT_NAME\",\"production_branch\":\"$PRODUCTION_BRANCH\"}" \
              | head -c 600 || true
          else
            echo "El proyecto ya existe."
          fi

      - name: Desplegar a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=regikaha --branch=main --commit-dirty=true

      - name: Configurar DNS + dominio regikaha.com + www
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          api="https://api.cloudflare.com/client/v4"
          auth="Authorization: Bearer $CF_API_TOKEN"
          target="${PROJECT_NAME}.pages.dev"

          # 1) Zona de regikaha.com
          ZID=$(curl -s -H "$auth" "$api/zones?name=$DOMAIN" | jq -r '.result[0].id // empty')
          echo "zone=$ZID"
          [ -n "$ZID" ] || { echo "::error::Zona $DOMAIN no encontrada en la cuenta"; exit 1; }

          # 2) Crear/actualizar el CNAME (apex + www) proxied → pages.dev
          for name in "$DOMAIN" "www.$DOMAIN"; do
            recid=$(curl -s -H "$auth" "$api/zones/$ZID/dns_records?name=$name&type=CNAME" | jq -r '.result[0].id // empty')
            payload=$(jq -nc --arg n "$name" --arg c "$target" '{type:"CNAME",name:$n,content:$c,proxied:true,ttl:1}')
            if [ -n "$recid" ]; then
              res=$(curl -s -X PATCH -H "$auth" -H "Content-Type: application/json" "$api/zones/$ZID/dns_records/$recid" --data "$payload")
            else
              res=$(curl -s -X POST -H "$auth" -H "Content-Type: application/json" "$api/zones/$ZID/dns_records" --data "$payload")
            fi
            if [ "$(echo "$res" | jq -r '.success')" = "true" ]; then
              echo "✅ DNS $name → $target"
            else
              echo "::error::DNS $name falló: $(echo "$res" | jq -c '.errors')"
              exit 1
            fi
          done

          # 3) Adjuntar dominios al proyecto Pages (idempotente) para validar
          for host in "$DOMAIN" "www.$DOMAIN"; do
            res=$(curl -s -X POST -H "$auth" -H "Content-Type: application/json" \
              "$api/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME/domains" --data "{\"name\":\"$host\"}")
            ok=$(echo "$res" | jq -r '.success // "false"')
            echo "Pages domain $host: success=$ok"
          done
          echo "DNS y dominios configurados. El certificado SSL se provisiona en unos minutos."
