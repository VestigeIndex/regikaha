name: Vincular D1 al proyecto Pages

# Vincula la base de datos D1 (binding DB) y activa nodejs_compat en el proyecto
# Pages 'regikaha', para que las Functions accedan a env.DB.

on:
  workflow_dispatch:

env:
  PROJECT: regikaha
  D1_UUID: c7cc8d9f-5e66-4289-8ec9-18ff7ab8b2cc

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - name: "PATCH bindings del proyecto"
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          api="https://api.cloudflare.com/client/v4"; auth="Authorization: Bearer $CF_API_TOKEN"
          cfg=$(jq -nc --arg id "$D1_UUID" '
            {
              d1_databases: { DB: { id: $id } },
              compatibility_date: "2024-11-01",
              compatibility_flags: ["nodejs_compat"]
            }')
          body=$(jq -nc --argjson c "$cfg" '{deployment_configs: {production: $c, preview: $c}}')
          res=$(curl -s -X PATCH -H "$auth" -H "Content-Type: application/json" \
            "$api/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT" --data "$body")
          echo "::notice title=patch::$(echo "$res" | jq -c '{s:.success, e:(.errors[0].message // "")}')"
          echo "$res" | jq -c '.result.deployment_configs.production.d1_databases' || true
          echo "$res" | jq -e '.success==true' >/dev/null
